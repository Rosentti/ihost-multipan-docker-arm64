name: 'build for version'
run-name: 'build for version ${{ inputs.base_version }}${{ github.event.client_payload.base_version }}'

on:
  workflow_dispatch:
    inputs:
      base_version:
        description: 'base version'
        required: true
        default: 'x.x.x'
  repository_dispatch:
    types: [build_version]

jobs:
  build_version:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: set version
        run: echo "BASE_VERSION=${{ inputs.base_version }}${{ github.event.client_payload.base_version }}" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          build-contexts: |
            ghcr.io/ihost-open-source-project/hassio-ihost-silabs-multiprotocol-arm64:${{ env.BASE_VERSION }}=docker-image://ghcr.io/ihost-open-source-project/hassio-ihost-silabs-multiprotocol-aarch64:${{ env.BASE_VERSION }}
          push: true
          platforms: linux/arm64
          tags: ghcr.io/rosentti/ihost-multipan-docker:latest
          build-args: |
            BASE_VERSION=${{ env.BASE_VERSION }}
